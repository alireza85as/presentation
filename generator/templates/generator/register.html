{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | PresentAI</title>
    <link rel="stylesheet" href="{% static 'generator/css/styles.css' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card card">
            <div class="auth-header">
                <h1 class="auth-title">ایجاد حساب کاربری</h1>
                <p class="auth-subtitle">برای شروع، اطلاعات خود را وارد کنید</p>
            </div>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name" class="form-label">نام و نام خانوادگی</label>
                    <input type="text" id="name" name="name" class="form-input" required placeholder="مثال: علی محمدی">
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">ایمیل</label>
                    <input type="email" id="email" name="email" class="form-input" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">رمز عبور</label>
                    <input type="password" id="password" name="password" class="form-input" required placeholder="حداقل ۸ کاراکتر">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password" class="form-label">تکرار رمز عبور</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" required placeholder="تکرار رمز عبور">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">ثبت‌نام</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-sm">
                    قبلاً ثبت‌نام کرده‌اید؟ 
                    <a href="{% url 'login' %}" class="text-primary">وارد شوید</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="{% static 'generator/js/theme.js' %}"></script>
</body>
</html>
