{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات حساب | PresentAI</title>
    <link rel="stylesheet" href="{% static 'generator/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'generator/css/dashboard.css' %}">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar (Same as Dashboard) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="{% url 'dashboard' %}" class="sidebar-logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                    <span>PresentAI</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'dashboard' %}" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    داشبورد
                </a>
                <a href="{% url 'create_pdf' %}" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                    ساخت PDF
                </a>
                <a href="{% url 'create_ppt' %}" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-1"></path><polygon points="12 15 17 21 7 21 12 15"></polygon></svg>
                    ساخت پاورپوینت
                </a>
                <a href="{% url 'saved_documents' %}" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    اسناد ذخیره شده
                </a>
                <a href="{% url 'settings' %}" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    تنظیمات حساب
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle" class="btn btn-outline btn-block" style="justify-content: space-between;">
                    <span>تغییر تم</span>
                    <i></i>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div style="margin-right: auto; display: flex; align-items: center; gap: 1rem;">
                    <span>{{ user.first_name }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-outline text-sm">خروج</a>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <h1 class="page-title">تنظیمات حساب کاربری</h1>
                </div>

                <div class="card" style="max-width: 600px;">
                    <form>
                        <div class="form-group">
                            <label class="form-label">نام و نام خانوادگی</label>
                            <input type="text" class="form-input" value="{{ user.first_name }}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">ایمیل</label>
                            <input type="email" class="form-input" value="{{ user.email }}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">وضعیت حساب</label>
                            <div class="alert alert-success" style="margin-bottom: 0;">
                                فعال و تایید شده
                            </div>
                        </div>
                        
                        <button type="button" class="btn btn-primary" disabled>ذخیره تغییرات</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="{% static 'generator/js/theme.js' %}"></script>
</body>
</html>
